name: "Envpilot"
description: "Pull environment variables from envpilot.dev into your workflow"
author: "envpilot.dev"

branding:
  icon: "lock"
  color: "purple"

inputs:
  token:
    description: "Envpilot service token (envpk_…), scoped to a project and environment. Create one in Envpilot under Project Settings → CI/CD Tokens."
    required: true
  environment:
    description: "Environment to pull variables from, e.g. production, staging, development."
    required: true
  api-url:
    description: "Envpilot API base URL. Override only for self-hosted or non-production instances."
    required: false
    default: "https://www.envpilot.dev"
  export-env:
    description: "When true, exports every pulled variable to $GITHUB_ENV so later steps can read it directly."
    required: false
    default: "true"
  env-file:
    description: "Optional path to write the pulled variables as a dotenv file. Skipped when unset."
    required: false

outputs:
  count:
    description: "Number of variables pulled from Envpilot."

runs:
  using: "node20"
  main: "dist/index.js"
